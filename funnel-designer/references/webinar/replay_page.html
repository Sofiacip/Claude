<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webinar Replay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            burgundy: { DEFAULT: '#8B1A3A', dark: '#5C1128', darker: '#34161B', light: '#A82050' },
            gold: { DEFAULT: '#C9963A', light: '#D4AB5E', faint: 'rgba(201,150,58,0.15)' },
            champagne: '#F5E6D0',
            blush: { DEFAULT: '#E8C4B0', light: '#F5D8D0', lighter: '#F8E8E0' },
            ivory: '#FAF5EE',
            charcoal: '#2C2C2C',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          },
          letterSpacing: { label: '0.12em', button: '0.1em' },
          lineHeight: { body: '1.7', tight: '0.9', snug: '1.1' }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; color: #2C2C2C; background: #FAF5EE; -webkit-font-smoothing: antialiased; }

    .noise-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
      z-index: 1;
    }

    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

    .cta-primary {
      background: #8B1A3A; color: #fff;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, opacity 0.3s ease;
      box-shadow: 0 4px 15px rgba(139,26,58,0.25), 0 2px 6px rgba(139,26,58,0.15);
    }
    .cta-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139,26,58,0.35), 0 4px 10px rgba(139,26,58,0.2); }
    .cta-primary:focus-visible { outline: 2px solid #C9963A; outline-offset: 3px; }
    .cta-primary:active { transform: translateY(0); opacity: 0.9; }

    .diamond-deco { position: absolute; width: 200px; height: 200px; opacity: 0.08; pointer-events: none; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #FAF5EE; }
    ::-webkit-scrollbar-thumb { background: #E8C4B0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #C9963A; }
  </style>
</head>
<body class="bg-ivory">

  <!-- ============================================ -->
  <!-- REPLAY SECTION -->
  <!-- ============================================ -->
  <section class="relative py-16 md:py-24 lg:py-32 overflow-hidden noise-overlay" style="background: linear-gradient(180deg, #FAF5EE 0%, #F5E6D0 100%);">
    <svg class="diamond-deco right-[10%] top-[10%]" viewBox="0 0 100 100"><polygon points="50,0 100,50 50,100 0,50" fill="none" stroke="#E8C4B0" stroke-width="0.3"/></svg>
    <svg class="diamond-deco left-[5%] bottom-[15%] opacity-[0.05]" viewBox="0 0 100 100"><polygon points="50,0 100,50 50,100 0,50" fill="none" stroke="#C9963A" stroke-width="0.4"/></svg>

    <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
      <!-- Label -->
      <p class="font-body text-xs font-bold uppercase tracking-label text-gold mb-6 reveal">Webinar Replay</p>

      <!-- Headline -->
      <h1 class="font-display text-3xl md:text-5xl lg:text-[3.5rem] font-semibold text-charcoal leading-tight mb-10 max-w-3xl mx-auto reveal reveal-delay-1" style="letter-spacing: -0.02em;">
        No Romance Without Finance:<br class="hidden md:block"> The Truth About Money, Power, and Modern Dating
      </h1>

      <!-- Video Embed -->
      <div class="max-w-3xl mx-auto mb-10 reveal reveal-delay-2">
        <div class="relative aspect-video rounded-2xl overflow-hidden" style="box-shadow: 0 25px 60px rgba(139,26,58,0.1), 0 8px 24px rgba(139,26,58,0.06);">
          <img src="https://placehold.co/960x540/34161B/F5E6D0?text=Webinar+Replay" alt="Webinar Replay" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-burgundy-darker/30 to-transparent"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-20 h-20 rounded-full bg-ivory/90 flex items-center justify-center cursor-pointer hover:bg-ivory transition-colors" style="box-shadow: 0 8px 30px rgba(44,44,44,0.15);">
              <svg class="w-8 h-8 text-burgundy ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- CTA -->
      <div class="reveal reveal-delay-3">
        <a href="#" class="cta-primary font-body font-bold text-sm uppercase tracking-button px-12 py-4 rounded-lg inline-block">
          Enrol to the Path to Financial Power Program
        </a>
      </div>
    </div>
  </section>

  <!-- ============================================ -->
  <!-- SCRIPTS -->
  <!-- ============================================ -->
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px 80px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    setTimeout(() => { document.querySelectorAll('.reveal:not(.visible)').forEach(el => el.classList.add('visible')); }, 1500);
  </script>

</body>
</html>
